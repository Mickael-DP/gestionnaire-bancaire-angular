<div class="min-h-screen bg-blue-900 flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-400 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-600 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl relative z-10 p-8">
        <div class="mb-8 text-center">
            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="pi pi-building-columns text-blue-700 text-2xl"></span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Se connecter</h1>
            <p class="text-gray-500 text-xs">Bon retour sur votre espace Ma Banque.</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5">Adresse E-mail</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 pi pi-envelope text-gray-400 text-sm"></span>
                    <input type="email" placeholder="votre@email.com" formControlName="email"
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none text-sm">
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="block text-xs font-semibold text-gray-700">Mot de passe</label>
                    <a href="#" class="text-[10px] font-bold text-blue-700 hover:underline">Oublié ?</a>
                </div>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 pi pi-lock text-gray-400 text-sm"></span>
                    <input type="password" placeholder="••••••••" formControlName="password"
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none text-sm">
                </div>
            </div>

            <button type="submit"
                class="w-full py-3.5 rounded-xl bg-blue-800 text-white font-bold text-base hover:bg-blue-900 transition-all shadow-lg shadow-blue-800/20 active:scale-[0.98] mt-2">
                Connexion
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-500 text-xs">
                Pas encore de compte ?
                <a routerLink="/inscription" class="text-blue-700 font-bold hover:underline">Ouvrir un compte</a>
            </p>
        </div>

        <div class="mt-6 pt-5 border-t border-gray-50 text-center">
            <a routerLink="/"
                class="text-gray-400 text-[11px] font-medium hover:text-gray-600 transition-colors flex items-center justify-center gap-2 uppercase tracking-wider">
                <span class="pi pi-arrow-left text-[10px]"></span>
                Retour à l'accueil
            </a>
        </div>
    </div>
</div>
