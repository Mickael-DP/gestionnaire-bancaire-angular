<div class="min-h-screen bg-blue-900 flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-400 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-600 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl relative z-10 p-7">
        <div class="mb-7 text-center">
            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="pi pi-user-plus text-blue-700 text-2xl"></span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Ouvrir un compte</h1>
            <p class="text-gray-500 text-xs">Rejoignez-nous en quelques secondes.</p>
        </div>

        <form class="space-y-3.5" (ngSubmit)="onSubmit()" [formGroup]="registerForm">
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Nom</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 pi pi-user text-gray-400 text-sm"></span>
                        <input type="text" placeholder="Dupont" formControlName="lastname"
                            class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none text-sm">
                    </div>
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Prénom</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 pi pi-user text-gray-400 text-sm"></span>
                        <input type="text" placeholder="Jean" formControlName="firstname"
                            class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none text-sm">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5">Adresse E-mail</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 pi pi-envelope text-gray-400 text-sm"></span>
                    <input type="email" placeholder="jean.dupont@exemple.com" formControlName="email"
                        class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-700 mb-1.5">Mot de passe</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 pi pi-lock text-gray-400 text-sm"></span>
                    <input type="password" placeholder="••••••••" formControlName="password"
                        class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none text-sm">
                </div>
            </div>

            <button type="submit"
                class="w-full py-3.5 rounded-xl bg-blue-800 text-white font-bold text-base hover:bg-blue-900 transition-all shadow-lg shadow-blue-800/20 active:scale-[0.98] mt-3">
                Ouvrir un compte
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-500 text-[11px] font-medium">
                Déjà un compte ?
                <a routerLink="/connexion" class="text-blue-700 font-bold hover:underline">Se connecter</a>
            </p>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-50 text-center">
            <a routerLink="/"
                class="text-gray-400 text-[10px] font-bold uppercase tracking-wider hover:text-gray-600 transition-colors flex items-center justify-center gap-2">
                <span class="pi pi-arrow-left text-[10px]"></span>
                Retour à l'accueil
            </a>
        </div>
    </div>
</div>
